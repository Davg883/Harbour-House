<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <style>
      .bg-fill { fill: none; }
      .navy-line { stroke: #0E1A2B; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .gold-line { stroke: #C9A35A; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .solid-navy { fill: #0E1A2B; }
      .solid-gold { fill: #C9A35A; }
      .badge-text { font-family: 'Montserrat', Helvetica, sans-serif; font-size: 11px; font-weight: 600; fill: #0E1A2B; letter-spacing: 5px; text-transform: uppercase; }
      .monogram-text { font-family: 'Playfair Display', Georgia, serif; font-size: 55px; fill: #0E1A2B; letter-spacing: -1px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg-fill" />

  <!-- Outer Double Circles -->
  <circle cx="150" cy="150" r="135" class="navy-line" style="stroke-width: 3;" />
  <circle cx="150" cy="150" r="127" class="gold-line" style="stroke-width: 1.5;" />
  <circle cx="150" cy="150" r="124" class="navy-line" style="stroke-width: 0.5; opacity: 0.5;" />

  <!-- Building Gable Icon (Top half) -->
  <g transform="translate(0, 5)">
    <!-- Roof Triangle -->
    <polygon points="105,100 150,68 195,100" class="navy-line" style="stroke-width: 2.5;" />
    <polygon points="112,100 150,74 188,100" class="gold-line" />
    
    <!-- Cupola/Spire at peak -->
    <line x1="150" y1="68" x2="150" y2="52" class="navy-line" style="stroke-width: 2;" />
    <polygon points="147,52 150,45 153,52" class="solid-navy" />
    <circle cx="150" cy="58" r="2.5" class="solid-gold" />
    
    <!-- Small arch window under gable -->
    <path d="M 140,92 A 10,10 0 0,1 160,92 Z" class="navy-line" style="stroke-width: 1.2;" />
    <line x1="140" y1="92" x2="160" y2="92" class="navy-line" style="stroke-width: 1;" />
  </g>

  <!-- Monogram HH (Middle) -->
  <text x="150" y="168" text-anchor="middle" class="monogram-text">HH</text>

  <!-- Gold Divider -->
  <line x1="105" y1="184" x2="195" y2="184" class="gold-line" style="stroke-width: 1.5;" />
  <circle cx="150" cy="184" r="2.5" class="solid-gold" />

  <!-- Curved Text Path (Bottom) -->
  <!-- We define a path that curves along the bottom rim (clockwise so text is right-side up) -->
  <path id="textPathBottom" d="M 54,165 A 102,102 0 0,0 246,165" fill="none" />
  
  <text class="badge-text">
    <textPath href="#textPathBottom" startOffset="50%" text-anchor="middle">
      HARBOUR HOUSE
    </textPath>
  </text>

</svg>
